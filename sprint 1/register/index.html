<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>S'inscrire</title>

<style>
/* ====== PAGE BACKGROUND ====== */
body {
  margin: 0;
  height: 100vh;
  background: url("https://i.imgur.com/Wam67CD.jpeg") no-repeat center center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  
}

/* ====== MAIN CONTAINER ====== */
.container {
  width: 800px;
  height: 450px;
  display: flex;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* ====== LEFT IMAGE SIDE ====== */
.left {
  width: 50%;
  background: url("https://i.imgur.com/JyQLL2X.jpeg") no-repeat center center/cover;
}

/* ====== RIGHT FORM SIDE ====== */
.right {
  width: 50%;
  padding: 40px;
  background: rgba(0, 0, 0, 0.6);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ====== TITLE ====== */
.right h2 {
  margin-bottom: 30px;
  text-align: center;
}

/* ====== ROWS FOR SIDE-BY-SIDE INPUTS ====== */
.row {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
}

.input-group {
  position: relative;
  flex: 1;
}

.input-group input {
  width: 100%;
  padding: 5px 0;
  border: none;
  background: transparent;
  color: white;
  font-size: 16px;
  outline: none;
}

.input-group::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 1px;
  background: gray; /* line color */
}

.input-group input::placeholder {
  color: rgba(255,255,255,0.6);
}

/* ====== BUTTON ====== */
button {
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: rgb(72, 42, 3);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: rgb(95, 54, 4);
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="container">
  <!-- LEFT IMAGE -->
  <div class="left"></div>

  <!-- RIGHT FORM -->
  <div class="right">
    <h2>Créer un compte</h2>

    <form id="signupForm" novalidate>
      <!-- ROW 1: EMAIL + USERNAME -->
      <div class="row">
  <!-- EMAIL COLUMN -->
  <div class="input-column">
    <div class="input-group">
      <input type="email" id="email" placeholder="E-mail">
    </div>
    <!-- ERROR MESSAGE SEPARATE -->
    <span class="error" id="emailError"></span>
  </div>

  <!-- USERNAME COLUMN -->
  <div class="input-column">
    <div class="input-group">
      <input type="text" id="username" placeholder="Nom d'utilisateur">
    </div>
    <span class="error" id="usernameError"></span>
  </div>
</div>

      <!-- ROW 2: PASSWORD + CONFIRM PASSWORD -->
      <div class="row">
  <!-- PASSWORD COLUMN -->
  <div class="input-column">
    <div class="input-group">
      <input type="password" id="password" placeholder="Mot de passe">
    </div>
    <!-- ERROR BELOW THE LINE -->
    <span class="error" id="passwordError"></span>
  </div>

  <!-- CONFIRM PASSWORD COLUMN -->
  <div class="input-column">
    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirmer mot de passe">
    </div>
    <span class="error" id="confirmPasswordError"></span>
  </div>
</div>
      <!-- PRIVACY POLICY CHECKBOX -->
       <div class="privacy-column">
  <input type="checkbox" id="privacy">
  <label for="privacy">
    J'accepte la <a href="#" style="color: whitesmoke; text-decoration: underline;">politique de confidentialité</a>
  </label>
  
  <!-- ERREUR sous le checkbox -->
  <span class="error" id="privacyError"></span>
</div>
    <br></br>
    <button type="submit">S'inscrire</button>
    <div class="login-link">
  Vous avez un compte ? <a href="#" class="login">Se connecter</a>
</div>
    </form>
  </div>
</div>
<div class="login-link">
<script src="script.js"></script>
</body>
</html>
