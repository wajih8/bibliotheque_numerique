<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>bibliotheque-connexion</title>
<style>
  body, html {
    margin: 0;
    height: 100%;
    font-family: 'Times New Roman', serif;
  }

  /* Full-page background image */
  body {
    background: url("lib.jpeg") no-repeat center center/cover;
    background-size: cover;
    display: flex;
    justify-content: flex-end; 
    align-items: center;
  }

  /* Right form container */
  .right {
    width: 30%; 
    min-width: 300px; /* Ensures it doesn't get too squashed on small screens */
    height: 100%;
    padding: 60px 40px;
    background: rgba(30, 20, 2, 0.7); 
    backdrop-filter: blur(10px); 
    color: white;
    box-sizing: border-box; /* Prevents padding from adding to width */
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h2 { margin-bottom: 10px; }
  p { margin-bottom: 30px; font-style: italic; opacity: 0.9; }

  /* Form styling */
  input[type="email"], 
  input[type="password"] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: rgba(28, 28, 28, 0.8);
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
    border-radius: 6px;
    box-sizing: border-box;
  }

  /* Flex container for Checkbox and Forgot Password */
  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    margin: 10px 0 20px 0;
  }

  .checkbox-group {
    display: flex;
    align-items: center;
  }

  .checkbox-group input {
    width: auto;
    margin-right: 8px;
  }

  .forgot-link {
    color: #1a73e8;
    text-decoration: none;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  button {
    width: 100%;
    padding: 14px;
    background: #1a73e8;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    font-size: 16px;
    transition: background 0.3s;
  }

  button:hover {
    background: #155ec4;
  }

  .signup-text {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
  }

  .signup-text a {
    color: #1a73e8;
    text-underline-offset: 3px;
    font-weight: bold;
    text-decoration: none;
  }
</style>
</head>
<body>
<form action="login.php" method="post" id="loginForm"></form>
<div class="right">
  <h2>Connecter</h2>
  <p>Votre voyage dans le monde des livres commence ici !</p>

  <input type="email" placeholder="E-mail"name="email">
  <input type="password" placeholder="Mot de passe"name="password">

  <div class="form-options">
    <div class="checkbox-group">
      <input type="checkbox" id="remember"name="remember">
      <label for="remember">Se souvenir de moi</label>
    </div>
    <a href="#" class="forgot-link">Mot de passe oublié ?</a>
  </div>
  <input name="subm"hidden>

  <button type="button" onclick="verifyAndSubmit()">Se connecter</button>

  <div class="signup-text">
    Pas encore de compte ? <a href="#">Inscrivez-vous</a>
  </div>
</div>
<script>
  function verifyAndSubmit() {
  const form = document.getElementById('loginForm');

    form.submit(); 
  
}
</script>
</body>
</html>
